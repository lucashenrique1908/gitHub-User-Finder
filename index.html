<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub User Finder</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <!-- Container central: evita layout colado nas bordas da tela -->
  <div class="app-shell">
    <!-- HEADER: identifica o projeto com visual de app -->
    <header class="app-header">
      <p class="app-kicker">Projeto</p>
      <h1>GitHub User Finder</h1>
    </header>

    <main class="app-main">
      <!-- SEARCH AREA: centro da aplicacao com input + botao -->
      <section class="search-section" aria-labelledby="search-title">
        <h2 id="search-title">Buscar Usuario</h2>

        <form class="search-form" role="search">
          <input
            id="search-input"
            type="search"
            placeholder="Digite um usuario do GitHub"
            aria-label="Campo de busca de usuario"
          >
          <button type="submit">Buscar</button>
        </form>

        <!-- SEARCH HISTORY: aparece apenas com buscas salvas e foco no input -->
        <div id="history-container" class="history-container hidden">
          <p>Buscas recentes</p>
          <ul id="history-list"></ul>
        </div>
      </section>

      <!-- RESULTS AREA: recebe varios cards de usuarios -->
      <section class="results-section" aria-labelledby="results-title">
        <div class="results-header">
          <h2 id="results-title">Resultados</h2>
        </div>

        <!-- Container vazio: os cards serao criados dinamicamente no JavaScript -->
        <div id="results-container" class="results-container"></div>
      </section>
    </main>
  </div>
</body>
</html>
