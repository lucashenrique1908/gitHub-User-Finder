<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub User Finder</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <!-- HEADER: identifica o projeto -->
  <header class="app-header">
    <h1>GitHub User Finder</h1>
  </header>

  <main class="app-main">
    <!-- SEARCH AREA: centro da aplicacao com input + botao -->
    <section class="search-section" aria-labelledby="search-title">
      <h2 id="search-title">Buscar Usuario</h2>

      <form class="search-form" role="search">
        <input
          id="search-input"
          type="search"
          placeholder="Digite um usuario do GitHub"
          aria-label="Campo de busca de usuario"
        >
        <button type="submit">Buscar</button>
      </form>

      <!-- SEARCH HISTORY: aparece apenas com buscas salvas e foco no input -->
      <div id="history-container" class="history-container hidden">
        <p>Buscas recentes</p>
        <ul id="history-list"></ul>
      </div>
    </section>

    <!-- RESULTS AREA: recebe varios cards de usuarios -->
    <section class="results-section" aria-labelledby="results-title">
      <h2 id="results-title">Resultados</h2>

      <div id="results-container" class="results-container">
        <!-- Card de exemplo para validar estrutura visual -->
        <article class="user-card">
          <img src="https://via.placeholder.com/56" alt="Avatar de lucas-henrique">
          <div>
            <h3>lucas-henrique</h3>
            <p>Frontend Developer</p>
            <a href="#" aria-label="Ver perfil de lucas-henrique">View profile</a>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
